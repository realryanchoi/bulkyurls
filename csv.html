<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BulkyURLs CSV</title>
  <link rel="stylesheet" href="css/popup.css">
</head>

<body class="csv-body">
  <h1><img src="img/bulkyurls-icon-32x32.png" alt=""> BulkyURLs</h1>

  <section id="export-section">
    <h2 class="csv-heading">Export CSV</h2>
    <p class="csv-desc">Preview of the file you're about to save — every URL in the list, one per row.</p>
    <textarea id="csv-preview" spellcheck="false" readonly aria-label="CSV preview"></textarea>
    <div class="actions">
      <button class="button clear" id="cancel-btn">Cancel</button>
      <button class="button primary" id="save-btn">Save to file</button>
    </div>
  </section>

  <section id="import-section">
    <h2 class="csv-heading">Import CSV</h2>
    <p class="csv-desc">Pick a CSV and BulkyURLs pulls the URLs out of every column. Headers, extra columns and
      duplicates are dropped for you.</p>
    <div class="actions">
      <button class="button primary" id="choose-btn">Choose file</button>
    </div>
    <p id="status"></p>
  </section>

  <script src="js/lib/urls.js"></script>
  <script src="js/csv.js"></script>
</body>

</html>
