<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>BulkyURLs CSV</title>
  <link rel="stylesheet" href="css/popup.css">
</head>

<body class="csv-body">
  <h1><img src="img/bulkyurls-icon-32x32.png"> BulkyURLs</h1>

  <section id="export-section">
    <h2 class="csv-heading">Export CSV</h2>
    <p class="csv-desc">Preview — click <strong>Save to File</strong> to choose a save location.</p>
    <textarea id="csv-preview" readonly></textarea>
    <div class="actions">
      <button class="button" id="save-btn">Save to File</button>
      <button class="button clear" id="cancel-btn">Cancel</button>
    </div>
  </section>

  <section id="import-section">
    <h2 class="csv-heading">Import CSV</h2>
    <p class="csv-desc">Select a CSV file — URLs from any column are extracted automatically.</p>
    <div class="actions">
      <button class="button" id="choose-btn">Choose File</button>
    </div>
    <p id="status"></p>
  </section>

  <script src="js/csv.js"></script>
</body>

</html>
