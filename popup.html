<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title></title>
  <link rel="stylesheet" href="css/popup.css">
</head>

<body>
  <h1><img src="img/bulkyurls-icon-32x32.png"> BulkyURLs</h1>
  <div class="textarea-wrapper">
    <div class="textarea-toolbar">
      <span id="urlCount" class="url-count">No URLs</span>
      <button class="button clear" id="clear">Clear</button>
    </div>
    <textarea name="somethingInput" id="userInput" placeholder="Paste URLs or any text containing links..."></textarea>
  </div>
  <div class="button-group">
    <button class="button" id="extractURLsFromText">URLs from Text</button>
    <button class="button" id="extractURLsFromTabs">URLs from Tabs</button>
    <button class="button" id="openURLsFromSelector">URLs from Selection</button>
    <button class="button" id="dedupeURLs">Remove Duplicates</button>
    <button class="button" id="exportCSV">Export CSV</button>
    <button class="button" id="importCSV">Import CSV</button>
  </div>
  <div class="open-row">
    <button class="button primary" id="openURLsInTabs">Open in New Tabs</button>
    <button class="button primary" id="openURLsInWindow">Open in New Window</button>
    <label class="delay-control" title="Seconds to wait between opening each URL">
      Delay
      <input type="number" id="delayInput" min="0" step="0.5" value="0"> s
    </label>
  </div>
  <div class="lists-row">
    <select id="savedLists"></select>
    <input type="text" id="listName" placeholder="List name">
    <button class="button small" id="saveList" title="Save the current URLs under this name">Save</button>
    <button class="button small clear" id="deleteList" title="Delete the selected list">Delete</button>
  </div>
  <div id="listStatus" class="list-status"></div>
  <script src="js/lib/urls.js"></script>
  <script src="js/popup.js"></script>
</body>

</html>
